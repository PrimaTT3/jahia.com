name: Build and Push

on: push

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: corepack enable
      - run: yarn install
      - run: yarn build
      - uses: actions/upload-artifact@v4
        with:
          name: package.tgz
          path: dist/package.tgz

      # If the build is successful and the branch is main, push the module to Jahia
      - if: success() && github.ref == 'refs/heads/main'
        run: curl -s --user '${{ secrets.JAHIA_USER }}' --form bundle=@dist/package.tgz --form start=true '${{ secrets.JAHIA_HOST }}/modules/api/bundles'
